name: Daily Coding Problem

on:
  schedule:
    - cron: '0 0 * * *'     # 5:30 AM IST
    - cron: '0 6 * * *'     # 11:30 AM IST
    - cron: '0 12 * * *'    # 5:30 PM IST
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Random delay (human-like timing)
        run: sleep $((RANDOM % 300))

      - name: Run daily practice script with retry
        run: |
          for i in 1 2 3; do
            python daily_practice.py && break
            echo "Retry $i failed... retrying"
            sleep 5
          done

      - name: Commit changes with human-like message
        run: |
          git config --global user.name "manaskhanger"
          git config --global user.email "khangermanas@gmail.com"
          git add .

          if git diff --cached --quiet; then
            echo "No changes today"
          else
            # Get latest problem file
            FILE=$(ls problems | sort | tail -n 1)

            # Extract problem title
            TITLE=$(head -n 1 problems/$FILE | sed 's/# //' | cut -d '(' -f1)

            # Human-like commit messages
            messages=(
              "Solved $TITLE"
              "Worked on $TITLE problem"
              "Practiced $TITLE"
              "DSA practice: $TITLE"
              "Solved a $TITLE problem today"
            )

            RANDOM_MSG=${messages[$RANDOM % ${#messages[@]}]}

            git commit -m "$RANDOM_MSG"
            git push
          fi
